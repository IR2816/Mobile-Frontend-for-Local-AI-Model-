name: local_ai_chat
description: A personal offline AI chat app powered by local llama-server.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_markdown: ^0.7.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.5
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
